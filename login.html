<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In &mdash; GearsVPN</title>
<style>
:root{--primary:#f01d4f;--primary-dark:#c8143a;--bg:#080808;--card:#181818;--border:#2a2a2a;--text:#ffffff;--muted:#888;--success:#22c55e;--error:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
body::before{content:"";position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(240,29,79,.08) 0%,transparent 70%);pointer-events:none;}
.logo{font-size:1.3rem;font-weight:900;text-decoration:none;color:var(--text);margin-bottom:2rem;display:flex;align-items:center;gap:.4rem;}
.logo em{color:var(--primary);font-style:normal;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.25rem;width:100%;max-width:400px;}
.type-tabs{display:flex;gap:.5rem;margin-bottom:2rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.3rem;}
.type-tab{flex:1;padding:.5rem;border:none;background:transparent;color:var(--muted);border-radius:7px;cursor:pointer;font-size:.88rem;font-weight:600;transition:all .2s;}
.type-tab.active{background:var(--primary);color:#fff;}
h2{font-size:1.25rem;font-weight:900;margin-bottom:.35rem;}
.sub{font-size:.84rem;color:var(--muted);margin-bottom:1.5rem;}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.35rem;margin-top:1rem;}
label:first-of-type{margin-top:0;}
input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s;}
input:focus{border-color:var(--primary);}
.forgot{display:block;text-align:right;font-size:.78rem;color:var(--muted);text-decoration:none;margin-top:.5rem;}
.forgot:hover{color:var(--text);}
.btn-login{width:100%;margin-top:1.5rem;padding:.8rem;background:var(--primary);color:#fff;border:none;border-radius:9px;font-size:.95rem;font-weight:800;cursor:pointer;transition:background .2s;}
.btn-login:hover{background:var(--primary-dark);}
.error-msg{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--error);border-radius:8px;padding:.65rem .9rem;font-size:.82rem;margin-top:1rem;}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0;color:var(--muted);font-size:.8rem;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border);}
.btn-signup{display:block;width:100%;padding:.75rem;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:9px;font-size:.9rem;font-weight:700;text-align:center;text-decoration:none;transition:border-color .2s;}
.btn-signup:hover{border-color:var(--muted);}
.trust-row{display:flex;justify-content:center;gap:1.25rem;margin-top:1.5rem;flex-wrap:wrap;}
.trust-item{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.3rem;}
.trust-item span{color:var(--success);}
</style>
</head>
<body>
<a href="index.html" class="logo">&#9881;&#65039; Gears<em>VPN</em></a>
<div class="card">
  <div class="type-tabs">
    <button class="type-tab active" id="tab-admin" onclick="switchType('admin')">Admin</button>
    <button class="type-tab" id="tab-client" onclick="switchType('client')">Client</button>
  </div>
  <h2 id="login-title">Admin Sign In</h2>
  <div class="sub" id="login-sub">Access the GearsVPN admin panel.</div>
  <label>Email Address</label>
  <input type="email" id="lemail" placeholder="admin@gearsvpn.com">
  <label>Password</label>
  <input type="password" id="lpass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
  <a href="#" class="forgot">Forgot password?</a>
  <div class="error-msg" id="error-msg">Incorrect email or password.</div>
  <button class="btn-login" onclick="doLogin()">Sign In</button>
  <div class="divider">or</div>
  <a href="index.html#pricing" class="btn-signup">Don't have an account? Get GearsVPN</a>
</div>
<div class="trust-row">
  <div class="trust-item"><span>&#10003;</span> 256-bit encrypted</div>
  <div class="trust-item"><span>&#10003;</span> No logs policy</div>
  <div class="trust-item"><span>&#10003;</span> Fast WireGuard</div>
</div>
<script>
var loginType="admin";
function switchType(t){
  loginType=t;
  document.getElementById("tab-admin").classList.toggle("active",t==="admin");
  document.getElementById("tab-client").classList.toggle("active",t==="client");
  document.getElementById("login-title").textContent=t==="admin"?"Admin Sign In":"Client Sign In";
  document.getElementById("login-sub").textContent=t==="admin"?"Access the GearsVPN admin panel.":"Access your VPN account dashboard.";
  document.getElementById("lemail").placeholder=t==="admin"?"admin@gearsvpn.com":"your@email.com";
  document.getElementById("error-msg").style.display="none";
}
function doLogin(){
  var email=document.getElementById("lemail").value.trim().toLowerCase();
  var pass=document.getElementById("lpass").value;
  var err=document.getElementById("error-msg");
  err.style.display="none";
  if(loginType==="admin"){
    if(email==="admin@gearsvpn.com"&&pass==="admin123"){
      localStorage.setItem("gv_admin_session","true");
      window.location.href="admin.html";
    }else{err.textContent="Incorrect email or password.";err.style.display="block";}
  }else{
    var orders=JSON.parse(localStorage.getItem("gv_orders")||"[]");
    var match=orders.find(function(o){return o.email.toLowerCase()===email&&o.status==="Paid";});
    if(match){
      localStorage.setItem("gv_client_session",JSON.stringify({email:email,name:match.name}));
      window.location.href="client.html";
    }else{
      err.textContent="No active account found. Check your email or purchase a plan.";
      err.style.display="block";
    }
  }
}
</script>
</body>
</html>
